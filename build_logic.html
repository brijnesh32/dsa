<html lang="en">

<head>
    <title>Document</title>
    <script>
        let data = [4, 74, 58, 41, 50];
        let evenArr = [];
        let count = 0;
        for (let i = 0; i < data.length; i++) {
            if (data[i] % 2 == 0) {
                evenArr[count] = data[i] * 2;
                count++;
            }
        }
        console.log(evenArr, count);

    </script>
